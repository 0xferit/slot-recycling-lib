name: Gas Badges

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  gas-badges:
    name: Generate gas savings badges
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1
          cache: true

      - name: Install dependencies
        run: forge soldeer install

      - name: Run showcase gas benchmark
        run: |
          set -o pipefail
          forge test --match-path test/showcase/ShowcaseGas.t.sol -vv | tee gas_output.txt

      - name: Generate badge endpoint JSON
        run: |
          set -euo pipefail

          extract() { grep "$1" gas_output.txt | awk '{print $NF}'; }

          lifecycle_bps=$(extract "lifecycle savings bps")
          bestcase_bps=$(extract "recycling savings bps")

          [[ "$lifecycle_bps" =~ ^[0-9]+$ ]] || { echo "Failed to parse lifecycle: '$lifecycle_bps'"; exit 1; }
          [[ "$bestcase_bps" =~ ^[0-9]+$ ]] || { echo "Failed to parse bestcase: '$bestcase_bps'"; exit 1; }

          lifecycle_pct=$(awk -v bps="$lifecycle_bps" 'BEGIN { printf "%.1f", bps / 100 }')
          bestcase_pct=$(awk -v bps="$bestcase_bps" 'BEGIN { printf "%.1f", bps / 100 }')

          mkdir -p .badges
          cat > .badges/recycling-savings.json <<EOF
          {
            "schemaVersion": 1,
            "label": "lifecycle (50% reuse): gas saved",
            "message": "${lifecycle_pct}%",
            "color": "brightgreen"
          }
          EOF

          cat > .badges/bestcase-savings.json <<EOF
          {
            "schemaVersion": 1,
            "label": "per recycled write: gas saved",
            "message": "${bestcase_pct}%",
            "color": "brightgreen"
          }
          EOF

      - name: Push badge data to gh-badges branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf /tmp/gh-badges
          mkdir -p /tmp/gh-badges/.badges
          cp .badges/*.json /tmp/gh-badges/.badges/
          cd /tmp/gh-badges

          git init
          git checkout --orphan gh-badges
          git add .badges/*.json
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m "Update gas savings badges"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-badges:gh-badges
